name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: flowD_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d flowD_db"
          --health-interval 3s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"

      - name: Install psql client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Apply schema
        env:
          PGPASSWORD: postgres
        run: psql -h localhost -U postgres -d flowD_db -f scripts/schema.sql

      - name: Go test
        env:
          DB_URL: postgres://postgres:postgres@localhost:5432/flowD_db?sslmode=disable
        run: |
          go test ./... -count=1
          go test -tags=integration ./... -count=1
